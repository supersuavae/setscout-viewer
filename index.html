<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SetScout 3D Viewer</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>
  <style>
    html, body, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; }
    #ui {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 14px 20px;
      border-radius: 12px;
      width: 420px;
      font-family: sans-serif;
      z-index: 999;
    }
    #ui h3 { margin: 0 0 10px 0; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: #f0a500; }
    #timeDisplay { font-size: 22px; font-weight: bold; margin-bottom: 6px; }
    #sunStats { font-size: 13px; color: #ccc; margin-bottom: 10px; }
    #scrubber { width: 100%; accent-color: #f0a500; }
    #keyTimes { display: flex; justify-content: space-between; font-size: 11px; color: #aaa; margin-top: 6px; }
    #keyTimes span { text-align: center; }
    #keyTimes .label { color: #f0a500; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="ui">
    <h3>☀️ Sun Path — <span id="locationName"></span></h3>
    <div id="timeDisplay">--:--</div>
    <div id="sunStats">Azimuth: -- | Elevation: --</div>
    <input type="range" id="scrubber" min="0" max="1440" value="720" />
    <div id="keyTimes">
      <span><div class="label">🌅</div><div id="t-sunrise">--</div></span>
      <span><div class="label">🌇</div><div id="t-golden1">--</div></span>
      <span><div class="label">☀️</div><div id="t-noon">--</div></span>
      <span><div class="label">🌆</div><div id="t-golden2">--</div></span>
      <span><div class="label">🌃</div><div id="t-sunset">--</div></span>
    </div>
  </div>

  <script>
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI3YTUzZDI5MC1hYzY0LTRhODctOGI0Mi1jZjM4NjFiYWZlM2QiLCJpZCI6NDE2OTcxLCJpYXQiOjE3NzU5NTgwNjh9.XLiMJOeS6bfl6V-SbpAe3tAAznxBPKheLvYVven0tXM';

    const params = new URLSearchParams(window.location.search);
    const lat = parseFloat(params.get("lat")) || 25.7617;
    const lng = parseFloat(params.get("lng")) || -80.1918;
    const zoom = parseFloat(params.get("zoom")) || 800;
    const name = params.get("name") || "Location";

    document.getElementById("locationName").textContent = decodeURIComponent(name);

    const viewer = new Cesium.Viewer("cesiumContainer", {
      timeline: false,
      animation: false,
      shadows: true,
      terrainShadows: Cesium.ShadowMode.ENABLED,
      terrain: Cesium.Terrain.fromWorldTerrain(),
    });

    // FREEZE the clock — only scrubber moves time
    viewer.clock.shouldAnimate = false;

    // Enable lighting
    viewer.scene.globe.enableLighting = true;

    // Add 3D OSM buildings anchored to terrain
    Cesium.createOsmBuildingsAsync().then(function(buildingTileset) {
      viewer.scene.primitives.add(buildingTileset);
      buildingTileset.shadows = Cesium.ShadowMode.ENABLED;
    });

    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(lng, lat, zoom),
      orientation: {
        heading: Cesium.Math.toRadians(0),
        pitch: Cesium.Math.toRadians(-45),
        roll: 0,
      }
    });

    // Red pin
    viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(lng, lat),
      point: { pixelSize: 12, color: Cesium.Color.RED },
      label: {
        text: decodeURIComponent(name),
        font: "14pt sans-serif",
        fillColor: Cesium.Color.WHITE,
        outlineColor: Cesium.Color.BLACK,
        outlineWidth: 2,
        style: Cesium.LabelStyle.FILL_AND_OUTLINE,
        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
        pixelOffset: new Cesium.Cartesian2(0, -20),
      }
    });

    // SunCalc
    const today = new Date();

    function getDateAtMinute(minute) {
      const d = new Date(today);
      d.setHours(0, 0, 0, 0);
      d.setMinutes(minute);
      return d;
    }

    function formatTime(date) {
      return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    const sunTimes = SunCalc.getTimes(today, lat, lng);
    document.getElementById("t-sunrise").textContent = formatTime(sunTimes.sunrise);
    document.getElementById("t-golden1").textContent = formatTime(sunTimes.goldenHour);
    document.getElementById("t-noon").textContent = formatTime(sunTimes.solarNoon);
    document.getElementById("t-golden2").textContent = formatTime(sunTimes.goldenHourEnd);
    document.getElementById("t-sunset").textContent = formatTime(sunTimes.sunset);

    // Sun path arc
    const ARC_HEIGHT = 2000;
    const pathPositions = [];

    for (let m = 0; m <= 1440; m += 5) {
      const d = getDateAtMinute(m);
      const pos = SunCalc.getPosition(d, lat, lng);
      if (pos.altitude > 0) {
        const distance = ARC_HEIGHT / Math.tan(pos.altitude);
        const az = pos.azimuth;
        const east = -distance * Math.sin(az);
        const north = -distance * Math.cos(az);
        const origin = Cesium.Cartesian3.fromDegrees(lng, lat, 0);
        const transform = Cesium.Transforms.eastNorthUpToFixedFrame(origin);
        const localPos = new Cesium.Cartesian3(east, north, ARC_HEIGHT);
        const worldPos = Cesium.Matrix4.multiplyByPoint(transform, localPos, new Cesium.Cartesian3());
        pathPositions.push(worldPos);
      }
    }

    if (pathPositions.length > 1) {
      viewer.entities.add({
        polyline: {
          positions: pathPositions,
          width: 3,
          material: new Cesium.PolylineGlowMaterialProperty({
            glowPower: 0.3,
            color: Cesium.Color.ORANGE,
          }),
        }
      });
    }

    // Sun marker
    const sunMarker = viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(lng, lat, ARC_HEIGHT),
      point: {
        pixelSize: 18,
        color: Cesium.Color.YELLOW,
        outlineColor: Cesium.Color.ORANGE,
        outlineWidth: 2,
      }
    });

    function updateSun(minute) {
      const d = getDateAtMinute(minute);
      const pos = SunCalc.getPosition(d, lat, lng);

      const hours = Math.floor(minute / 60);
      const mins = minute % 60;
      document.getElementById("timeDisplay").textContent =
        `${String(hours).padStart(2,'0')}:${String(mins).padStart(2,'0')}`;

      const azDeg = ((pos.azimuth * 180 / Math.PI) + 180).toFixed(1);
      const altDeg = (pos.altitude * 180 / Math.PI).toFixed(1);
      document.getElementById("sunStats").textContent =
        `Azimuth: ${azDeg}° | Elevation: ${altDeg}°`;

      if (pos.altitude > 0) {
        const distance = ARC_HEIGHT / Math.tan(pos.altitude);
        const az = pos.azimuth;
        const east = -distance * Math.sin(az);
        const north = -distance * Math.cos(az);
        const origin = Cesium.Cartesian3.fromDegrees(lng, lat, 0);
        const transform = Cesium.Transforms.eastNorthUpToFixedFrame(origin);
        const localPos = new Cesium.Cartesian3(east, north, ARC_HEIGHT);
        const worldPos = Cesium.Matrix4.multiplyByPoint(transform, localPos, new Cesium.Cartesian3());
        sunMarker.position = new Cesium.ConstantPositionProperty(worldPos);
        sunMarker.point.color = new Cesium.ConstantProperty(Cesium.Color.YELLOW);
      } else {
        sunMarker.point.color = new Cesium.ConstantProperty(Cesium.Color.GRAY);
      }

      // Set Cesium clock to this exact moment — frozen until next scrub
      viewer.clock.currentTime = Cesium.JulianDate.fromDate(d);
    }

    document.getElementById("scrubber").addEventListener("input", function() {
      updateSun(parseInt(this.value));
    });

    updateSun(720);
  </script>
</body>
</html>
